name: sekura

services:
  sekura:
    build: .
    image: sekura
    container_name: sekura
    ports:
      - "${SEKURA_PORT:-8080}:8080"
    volumes:
      - sekura-data:/app/data
    env_file:
      # Full app configuration (copy .env.template to .env.prod and fill in
      # secrets). Values are used as-is; no variable interpolation is applied.
      # .env.docker is a legacy override kept for compatibility; its values
      # win over .env.prod.
      - path: .env.prod
        required: false
      - path: .env.docker
        required: false
    environment:
      # Shell-exported values win over .env.docker entries; unset variables
      # are ignored, so they never blank out env_file values.
      - AdminAuth__PasswordHash
      - Encryption__Passphrase
      - AdminAuth__Username
    restart: unless-stopped

volumes:
  sekura-data:
    name: sekura-data
